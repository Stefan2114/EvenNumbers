name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull the code from your repo onto the runner
    - uses: actions/checkout@v4

    # 2. Set up the Java version
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven' # This handles caching of your ~/.m2/repository automatically

    # 3. Build and run tests
    - name: Build and Test with Maven
      run: mvn -B clean verify
